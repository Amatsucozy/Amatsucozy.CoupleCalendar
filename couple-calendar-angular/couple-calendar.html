<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Calendar ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #f2c4ce;
    --rose: #e8849a;
    --deep: #c45c78;
    --cream: #fdf6f0;
    --warm: #f9ede4;
    --ink: #2d1f28;
    --soft: #8a6570;
    --morning: #fde8a0;
    --morning-d: #e8b84b;
    --lunch: #b8e4c8;
    --lunch-d: #4aab72;
    --afterwork: #b8d4f0;
    --afterwork-d: #4a82c8;
    --evening: #d4b8f0;
    --evening-d: #7a4ab8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 10% 20%, rgba(242,196,206,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(212,184,240,0.25) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    position: relative;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    color: var(--deep);
    letter-spacing: -0.02em;
  }
  header h1 em {
    font-style: italic;
    color: var(--rose);
  }
  .subtitle {
    font-size: 0.85rem;
    color: var(--soft);
    margin-top: 0.3rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* NAV */
  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin: 1rem 0 1.5rem;
  }
  .nav button {
    background: none;
    border: 1.5px solid var(--blush);
    color: var(--deep);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav button:hover { background: var(--blush); }
  .nav .month-label {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--ink);
    min-width: 180px;
    text-align: center;
  }

  /* LEGEND */
  .legend {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin: 0 1rem 1.5rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--soft);
    letter-spacing: 0.03em;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
  }

  /* CALENDAR GRID */
  .calendar-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 0.75rem 2rem;
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }
  .weekday {
    text-align: center;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--soft);
    padding: 0.3rem 0;
  }
  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  /* DAY CELL */
  .day {
    background: white;
    border-radius: 12px;
    min-height: 90px;
    padding: 6px;
    position: relative;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    box-shadow: 0 1px 3px rgba(45,31,40,0.05);
  }
  .day:hover { border-color: var(--blush); box-shadow: 0 4px 16px rgba(196,92,120,0.12); transform: translateY(-1px); }
  .day.empty { background: transparent; box-shadow: none; cursor: default; }
  .day.empty:hover { border-color: transparent; transform: none; }
  .day.today { border-color: var(--rose); }
  .day.today .day-num { 
    background: var(--rose); color: white; border-radius: 50%;
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    font-weight: 500;
  }
  .day-num {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .day.other-month .day-num { color: #ccc; }

  /* PERIOD SLOTS inside day */
  .period-slots {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .slot-tag {
    border-radius: 5px;
    padding: 2px 5px;
    font-size: 0.62rem;
    font-weight: 500;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .slot-tag:hover { opacity: 0.75; }
  .slot-tag.morning { background: var(--morning); color: #7a5a00; }
  .slot-tag.lunch { background: var(--lunch); color: #1a5a35; }
  .slot-tag.afterwork { background: var(--afterwork); color: #1a3a6a; }
  .slot-tag.evening { background: var(--evening); color: #4a1a78; }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(45,31,40,0.45);
    z-index: 100;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  .overlay.open { display: flex; align-items: center; justify-content: center; padding: 1rem; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  .modal {
    background: var(--cream);
    border-radius: 20px;
    padding: 1.75rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(45,31,40,0.2);
    animation: slideUp 0.25s ease;
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-date {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--deep);
    margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .modal-date span { font-size: 1.2rem; }

  .close-btn {
    position: absolute;
    top: 1rem; right: 1rem;
    background: var(--warm);
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    color: var(--soft);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .close-btn:hover { background: var(--blush); }

  /* Period selector */
  .period-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .period-btn {
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 0.6rem 0.5rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    display: flex; align-items: center; gap: 0.4rem;
    transition: all 0.15s;
    background: white;
  }
  .period-btn.morning { border-color: var(--morning-d); color: #7a5a00; }
  .period-btn.lunch { border-color: var(--lunch-d); color: #1a5a35; }
  .period-btn.afterwork { border-color: var(--afterwork-d); color: #1a3a6a; }
  .period-btn.evening { border-color: var(--evening-d); color: #4a1a78; }
  .period-btn.morning.active { background: var(--morning); }
  .period-btn.lunch.active { background: var(--lunch); }
  .period-btn.afterwork.active { background: var(--afterwork); }
  .period-btn.evening.active { background: var(--evening); }

  /* Activity select */
  .field-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--soft);
    margin-bottom: 0.4rem;
    margin-top: 1rem;
  }
  .activity-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.4rem;
    margin-bottom: 0.8rem;
  }
  .act-btn {
    background: white;
    border: 1.5px solid var(--blush);
    border-radius: 10px;
    padding: 0.5rem 0.3rem;
    cursor: pointer;
    font-size: 0.75rem;
    color: var(--ink);
    transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-family: 'DM Sans', sans-serif;
  }
  .act-btn .emoji { font-size: 1.2rem; }
  .act-btn:hover { border-color: var(--rose); }
  .act-btn.active { background: var(--blush); border-color: var(--rose); font-weight: 500; }

  .note-input {
    width: 100%;
    border: 1.5px solid var(--blush);
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    background: white;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .note-input:focus { border-color: var(--rose); }

  .modal-actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 1.2rem;
  }
  .btn-save {
    flex: 1;
    background: var(--rose);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.7rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-save:hover { background: var(--deep); }
  .btn-cancel {
    background: var(--warm);
    color: var(--soft);
    border: none;
    border-radius: 10px;
    padding: 0.7rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-cancel:hover { background: var(--blush); }

  /* EVENT DETAIL MODAL */
  .event-list { display: flex; flex-direction: column; gap: 0.7rem; margin-top: 0.5rem; }
  .event-card {
    border-radius: 12px;
    padding: 0.8rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .event-card.morning { background: var(--morning); }
  .event-card.lunch { background: var(--lunch); }
  .event-card.afterwork { background: var(--afterwork); }
  .event-card.evening { background: var(--evening); }
  .event-card-info { flex: 1; }
  .event-card-period {
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    opacity: 0.7;
    margin-bottom: 0.15rem;
  }
  .event-card-title { font-size: 0.9rem; font-weight: 500; }
  .event-card-note { font-size: 0.78rem; opacity: 0.75; margin-top: 0.15rem; }
  .event-del {
    background: rgba(255,255,255,0.6);
    border: none;
    border-radius: 6px;
    width: 26px; height: 26px;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
    opacity: 0.6;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .event-del:hover { opacity: 1; }

  .add-more-btn {
    width: 100%;
    background: var(--warm);
    border: 1.5px dashed var(--blush);
    border-radius: 10px;
    padding: 0.6rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--soft);
    cursor: pointer;
    margin-top: 0.8rem;
    transition: all 0.2s;
  }
  .add-more-btn:hover { background: var(--blush); color: var(--deep); }

  @media (max-width: 600px) {
    .day { min-height: 70px; padding: 4px; }
    .slot-tag { font-size: 0.56rem; }
    .modal { padding: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Our <em>Together</em> Calendar ♡</h1>
  <p class="subtitle">Plan your moments, big & small</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--morning)"></div> Morning</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--lunch)"></div> Lunch Break</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--afterwork)"></div> After Work</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--evening)"></div> Evening</div>
</div>

<div class="nav">
  <button id="prevBtn">‹</button>
  <div class="month-label" id="monthLabel"></div>
  <button id="nextBtn">›</button>
</div>

<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
    <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div>
    <div class="weekday">Sat</div>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<!-- MODAL: Add Event -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <button class="close-btn" id="closeAdd">✕</button>
    <div class="modal-date" id="modalDateLabel"><span>♡</span> <span id="modalDateText"></span></div>

    <div class="field-label">Time of day</div>
    <div class="period-select">
      <button class="period-btn morning" data-period="morning">🌅 Morning</button>
      <button class="period-btn lunch" data-period="lunch">☀️ Lunch Break</button>
      <button class="period-btn afterwork" data-period="afterwork">🌆 After Work</button>
      <button class="period-btn evening" data-period="evening">🌙 Evening</button>
    </div>

    <div class="field-label">Activity</div>
    <div class="activity-grid" id="activityGrid"></div>

    <div class="field-label">Note (optional)</div>
    <textarea class="note-input" id="noteInput" rows="2" placeholder="Add a little note…"></textarea>

    <div class="modal-actions">
      <button class="btn-cancel" id="cancelAdd">Cancel</button>
      <button class="btn-save" id="saveEvent">Save ♡</button>
    </div>
  </div>
</div>

<!-- MODAL: View Day -->
<div class="overlay" id="viewOverlay">
  <div class="modal">
    <button class="close-btn" id="closeView">✕</button>
    <div class="modal-date"><span>♡</span> <span id="viewDateText"></span></div>
    <div class="event-list" id="eventList"></div>
    <button class="add-more-btn" id="addMoreBtn">+ Add another plan</button>
  </div>
</div>

<script>
const ACTIVITIES = [
  { id: 'lunch',   emoji: '🍜', label: 'Lunch' },
  { id: 'date',    emoji: '💑', label: 'Date Night' },
  { id: 'stay',    emoji: '🏨', label: 'Stay Over' },
  { id: 'escort',  emoji: '🚗', label: 'Escort' },
  { id: 'coffee',  emoji: '☕', label: 'Coffee' },
  { id: 'movie',   emoji: '🎬', label: 'Movie' },
  { id: 'walk',    emoji: '🌿', label: 'Walk' },
  { id: 'cook',    emoji: '🍳', label: 'Cook Together' },
  { id: 'shop',    emoji: '🛍️', label: 'Shopping' },
  { id: 'travel',  emoji: '✈️', label: 'Travel' },
  { id: 'gym',     emoji: '🏋️', label: 'Gym' },
  { id: 'other',   emoji: '💜', label: 'Other' },
];

const PERIODS = {
  morning:   { label: 'Morning', emoji: '🌅' },
  lunch:     { label: 'Lunch Break', emoji: '☀️' },
  afterwork: { label: 'After Work', emoji: '🌆' },
  evening:   { label: 'Evening', emoji: '🌙' },
};

let events = JSON.parse(localStorage.getItem('coupleCalEvents') || '{}');
let currentDate = new Date();
let viewYear = currentDate.getFullYear();
let viewMonth = currentDate.getMonth();

let selectedDay = null;
let selectedPeriod = null;
let selectedActivity = null;

// Build activity grid
const actGrid = document.getElementById('activityGrid');
ACTIVITIES.forEach(a => {
  const btn = document.createElement('button');
  btn.className = 'act-btn';
  btn.dataset.act = a.id;
  btn.innerHTML = `<span class="emoji">${a.emoji}</span>${a.label}`;
  btn.onclick = () => {
    actGrid.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedActivity = a;
  };
  actGrid.appendChild(btn);
});

// Period buttons
document.querySelectorAll('.period-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPeriod = btn.dataset.period;
  };
});

function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function saveEvents() { localStorage.setItem('coupleCalEvents', JSON.stringify(events)); }

function renderCalendar() {
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('monthLabel').textContent = `${months[viewMonth]} ${viewYear}`;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();
  const today = new Date();

  // Prev month filler
  for (let i = firstDay - 1; i >= 0; i--) {
    const cell = document.createElement('div');
    cell.className = 'day other-month empty';
    grid.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    cell.className = 'day';
    const isToday = d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
    if (isToday) cell.classList.add('today');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    const key = dateKey(viewYear, viewMonth, d);
    const dayEvents = events[key] || [];

    const slots = document.createElement('div');
    slots.className = 'period-slots';
    dayEvents.forEach((ev, idx) => {
      const tag = document.createElement('div');
      tag.className = `slot-tag ${ev.period}`;
      const act = ACTIVITIES.find(a => a.id === ev.activity);
      tag.textContent = `${act ? act.emoji : ''} ${act ? act.label : ev.activity}`;
      tag.onclick = (e) => { e.stopPropagation(); openViewModal(key); };
      slots.appendChild(tag);
    });
    cell.appendChild(slots);

    cell.onclick = () => openDayModal(key, d);
    grid.appendChild(cell);
  }

  // Trailing empty cells
  const total = firstDay + daysInMonth;
  const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 0; i < trailing; i++) {
    const cell = document.createElement('div');
    cell.className = 'day other-month empty';
    grid.appendChild(cell);
  }
}

function formatKeyDisplay(key) {
  const [y, m, d] = key.split('-');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dateObj = new Date(+y, +m-1, +d);
  return `${days[dateObj.getDay()]}, ${months[+m-1]} ${+d}`;
}

function openDayModal(key, d) {
  selectedDay = key;
  selectedPeriod = null;
  selectedActivity = null;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('noteInput').value = '';
  document.getElementById('modalDateText').textContent = formatKeyDisplay(key);
  document.getElementById('addOverlay').classList.add('open');
}

function openViewModal(key) {
  selectedDay = key;
  document.getElementById('viewDateText').textContent = formatKeyDisplay(key);
  renderEventList(key);
  document.getElementById('viewOverlay').classList.add('open');
}

function renderEventList(key) {
  const list = document.getElementById('eventList');
  list.innerHTML = '';
  const dayEvents = events[key] || [];
  if (dayEvents.length === 0) {
    list.innerHTML = '<p style="color:var(--soft);font-size:0.85rem;text-align:center;padding:0.5rem">No plans yet ✨</p>';
    return;
  }
  dayEvents.forEach((ev, idx) => {
    const act = ACTIVITIES.find(a => a.id === ev.activity);
    const card = document.createElement('div');
    card.className = `event-card ${ev.period}`;
    card.innerHTML = `
      <div class="event-card-info">
        <div class="event-card-period">${PERIODS[ev.period]?.emoji || ''} ${PERIODS[ev.period]?.label || ev.period}</div>
        <div class="event-card-title">${act ? act.emoji + ' ' + act.label : ev.activity}</div>
        ${ev.note ? `<div class="event-card-note">${ev.note}</div>` : ''}
      </div>
      <button class="event-del" data-idx="${idx}">✕</button>
    `;
    card.querySelector('.event-del').onclick = () => {
      events[key].splice(idx, 1);
      if (events[key].length === 0) delete events[key];
      saveEvents();
      renderCalendar();
      renderEventList(key);
    };
    list.appendChild(card);
  });
}

document.getElementById('closeAdd').onclick = () => document.getElementById('addOverlay').classList.remove('open');
document.getElementById('cancelAdd').onclick = () => document.getElementById('addOverlay').classList.remove('open');
document.getElementById('closeView').onclick = () => document.getElementById('viewOverlay').classList.remove('open');

document.getElementById('addMoreBtn').onclick = () => {
  document.getElementById('viewOverlay').classList.remove('open');
  openDayModal(selectedDay, null);
};

document.getElementById('addOverlay').onclick = (e) => {
  if (e.target === document.getElementById('addOverlay')) document.getElementById('addOverlay').classList.remove('open');
};
document.getElementById('viewOverlay').onclick = (e) => {
  if (e.target === document.getElementById('viewOverlay')) document.getElementById('viewOverlay').classList.remove('open');
};

document.getElementById('saveEvent').onclick = () => {
  if (!selectedPeriod) { alert('Please choose a time of day ♡'); return; }
  if (!selectedActivity) { alert('Please choose an activity ♡'); return; }
  const note = document.getElementById('noteInput').value.trim();
  if (!events[selectedDay]) events[selectedDay] = [];
  events[selectedDay].push({ period: selectedPeriod, activity: selectedActivity.id, note });
  saveEvents();
  renderCalendar();
  document.getElementById('addOverlay').classList.remove('open');
};

document.getElementById('prevBtn').onclick = () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
};
document.getElementById('nextBtn').onclick = () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
};

renderCalendar();
</script>
</body>
</html>
